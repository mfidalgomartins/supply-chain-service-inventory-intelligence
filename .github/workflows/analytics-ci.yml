name: Analytics CI

on:
  push:
    branches: ["**"]
  pull_request:

jobs:
  quality-gates:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run End-to-End Analytics Pipeline
        env:
          MPLBACKEND: Agg
        run: |
          python src/run_pipeline.py

      - name: Run Unit Tests
        run: pytest -q
